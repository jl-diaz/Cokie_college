<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/phoneLogin.css">
</head>
<body>


<div class="login-wrapper">

  
  <div class="hero">
    <div class="hero-image-slot">
      <img src="../img/headerCokie.png" alt="">
    </div>
    <svg class="hero-curve" viewBox="0 0 390 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,70 Q195,0 390,70 L390,70 L0,70 Z" fill="#ffffff"/>
    </svg>
  </div>

  
  <div class="form-card">

    <!-- Logo solo visible en desktop -->
    <div class="desktop-logo">
      <div class="d-avatar"></div>
    </div>

    <h2>
      Bienvenido a
      <small><img src="../img/CokieCollege.png" alt=""></small>
    </h2>

    <div class="field">
      <div class="input-wrap">
        <span class="icon"></span>
        <input type="email" placeholder="Codigo de estudiante" autocomplete="email"/>
      </div>
    </div>

    <div class="field">
      <div class="input-wrap">
        <span class="icon"></span>
        <input type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <div class="forgot">
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <a href="../html/PanelGeneralEs.html"><button class="btn-login" type="button">Iniciar sesión</button></a>
    <a href="../html/PanelGeneralProf.html"><button class="btn-login" type="button">Iniciar sesión prof</button></a>

    <p class="register">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </p>

  </div>
</div>

    
</body>
</html>
